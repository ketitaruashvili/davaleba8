<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Lecture 8</title>
  </head>

  <body>
    <section class="sign-up">
      <div class="form-card">
        <div class="form-header">
          <div class="header-title">
            <h3 class="premium">Premium</h3>

            <h3 class="price">$199<span class="month">/month</span></h3>
          </div>

          <p class="header-desc">Faster Instagram Growth</p>
        </div>

        <form action="#" class="sign-up-form">
          <input type="email" placeholder="Email" />

          <input type="text" placeholder="Cardholder Name" />

          <div class="card-input">
            <input type="text" placeholder="Card Number" />
            <img class="card-icon" src="./images/Vector.svg" alt="card-icon" />
          </div>

          <div class="row-inputs">
            <input type="text" placeholder="Date" class="small-input" />
            <input type="text" placeholder="CVV" class="cvv-input" />
          </div>

          <div class="row-inputs">
            <div class="select-wrapper">
              <select>
                <option selected disabled>Country</option>
                <option>Georgia</option>
                <option>USA</option>
                <option>France</option>
              </select>
            </div>

            <input type="text" placeholder="Zip" class="cvv-input" />
          </div>

          <input type="text" placeholder="Discount Code" />

          <div class="terms">
            <input type="checkbox" class="checkbox" />

            <p>
              I accept the
              <a href="#">Terms of Service</a>
              and
              <a href="#">Privacy Policy</a>
            </p>
          </div>

          <button type="submit" class="submit-btn">
            Get started | $199
            <span class="sale">$249</span>
          </button>

          <p class="coupon">Have a coupon?</p>
        </form>
      </div>
    </section>
  </body>
</html>
